<!DOCTYPE html>
<html lang="en" data-default-theme="__BRAND_DEFAULT_THEME__">
<head>
  <script>
    /* Pre-paint theme resolver. Runs before any CSS is parsed so the
       SPA paints the right background on first frame. Resolution:
         saved → ASSAY_WHITELABEL_DEFAULT_THEME → prefers-color-scheme. */
    (function () {
      try {
        var saved = localStorage.getItem('assay-theme');
        var def = (document.documentElement.dataset.defaultTheme || 'auto');
        var theme = saved
          || ((def === 'dark' || def === 'light') ? def : null)
          || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__PAGE_TITLE__</title>
  __FAVICON_LINK__
  <link rel="stylesheet" href="/workflow/theme.css?v=__ASSETV__">
  <link rel="stylesheet" href="/workflow/style.css?v=__ASSETV__">
  <link rel="stylesheet" href="/auth/style.css?v=__ASSETV__">
  <link rel="stylesheet" href="/shared/cross-nav.css?v=__ASSETV__">
  <link rel="stylesheet" href="/engine/style.css?v=__ASSETV__">
  __EXTRA_CSS_LINK__
</head>
<body__DEFAULT_NAMESPACE_ATTR__>
  <header class="cross-nav">
    <div class="cross-nav-brand">
      <span class="cross-nav-mark" aria-hidden="true">__BRAND_MARK__</span>
      <span class="cross-nav-title">__BRAND_NAME__ <span class="cross-nav-version" id="cross-nav-version">v—</span></span>
    </div>
    <div class="cross-nav-status">
      <span class="cross-nav-leader" id="cross-nav-leader" title="Leader / instance status">
        <span class="cross-nav-dot" id="cross-nav-leader-dot"></span><span id="cross-nav-leader-text">leader</span>
      </span>
      <span class="cross-nav-instance" id="cross-nav-instance" title="Instance ID">instance:—</span>
    </div>
  </header>

  <div class="layout layout-engine">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <!-- Per-console switcher: renders three icon tabs (Workflow /
             Auth / Engine) via /shared/cross-nav.js. Replaces the old
             duplicated `Assay / Engine Console` brand block — the top
             cross-nav already shows `Assay Engine vX.Y.Z`, so the
             sidebar header just identifies the active console via the
             highlighted tab. Hover any tab → tooltip with its label. -->
        <nav class="cross-nav-pills" id="cross-nav-pills" aria-label="Console switcher" data-parent-url="__BRAND_PARENT_URL__" data-parent-name="__BRAND_PARENT_NAME__"></nav>
        <button type="button" class="header-icon-btn" id="sidebar-collapse" title="Collapse sidebar" aria-label="Toggle sidebar">
          <svg class="icon-collapse" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
          <svg class="icon-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-link active" data-view="info">
          <span class="nav-icon">&#9432;</span> <span class="nav-label">Info</span>
        </a>
        <a href="#" class="nav-link" data-view="modules">
          <span class="nav-icon">&#128722;</span> <span class="nav-label">Modules</span>
        </a>
        <a href="#" class="nav-link" data-view="instances">
          <span class="nav-icon">&#128187;</span> <span class="nav-label">Instances</span>
        </a>
        <a href="#" class="nav-link" data-view="audit">
          <span class="nav-icon">&#128203;</span> <span class="nav-label">Audit</span>
        </a>
        <a href="#" class="nav-link" data-view="config">
          <span class="nav-icon">&#9881;</span> <span class="nav-label">Config</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="nav-link nav-link-button nav-link-icon" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <span class="nav-icon icon-sun">&#9788;</span>
          <span class="nav-icon icon-moon">&#9790;</span>
        </button>
      </div>
    </aside>

    <main id="content" class="main-content"></main>
  </div>

  <footer class="status-bar">
    <span class="status-item" id="status-admin">

      <span id="admin-text">Admin token required</span>
    </span>

      __ENGINE_FOOTER__

  <script src="/engine/app.js?v=__ASSETV__"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <!--
    Provider icon sprite. Single SVG document containing one <symbol>
    per supported upstream IdP, referenced by the login page via
    <svg><use href="/auth/icons.svg#<slug>"/></svg>.

    Paths are from the Simple Icons project (https://simpleicons.org),
    CC0 1.0 licensed. Each symbol is single-path single-fill per the
    Simple Icons convention — the brand colour is set on the symbol's
    <path fill="..."/> so users render at the brand colour automatically.

    To add a provider: drop in a new <symbol id="slug"> with the
    upstream's Simple Icons path data and brand fill colour.
  -->

  <!-- Google: iconic 4-colour G (multi-path). Single-path Simple Icons
       version was a flat blue silhouette — recognizable but visually
       wrong for "Sign in with Google" buttons which always show the
       multi-colour mark. Colours per Google brand guidelines. -->

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assay Workflow Dashboard</title>
  <link rel="stylesheet" href="/workflow/theme.css">
  <link rel="stylesheet" href="/workflow/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Assay</h1>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
          <span class="icon-sun">&#9788;</span>
          <span class="icon-moon">&#9790;</span>
        </button>
      </div>
      <div class="sidebar-section">
        <label class="sidebar-label" for="namespace-select">Namespace</label>
        <select id="namespace-select" class="namespace-select"></select>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-link active" data-view="workflows">
          <span class="nav-icon">&#9654;</span> Workflows
        </a>
        <a href="#" class="nav-link" data-view="schedules">
          <span class="nav-icon">&#9200;</span> Schedules
        </a>
        <a href="#" class="nav-link" data-view="workers">
          <span class="nav-icon">&#9881;</span> Workers
        </a>
        <a href="#" class="nav-link" data-view="queues">
          <span class="nav-icon">&#9776;</span> Queues
        </a>
        <a href="#" class="nav-link" data-view="settings">
          <span class="nav-icon">&#9881;</span> Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/api/v1/docs" class="nav-link" target="_blank">
          <span class="nav-icon">&#128196;</span> API Docs
        </a>
      </div>
    </aside>

    <main id="content" class="main-content"></main>

    <div id="detail-panel" class="detail-panel"></div>
  </div>

  <footer class="status-bar">
    <span class="status-item" id="status-connection">
      <span class="status-dot" id="connection-dot"></span>
      <span id="connection-text">Connecting...</span>
    </span>
    <span class="status-item">
      Namespace: <strong id="status-namespace">main</strong>
    </span>
    <span class="status-item">
      Workers: <strong id="status-workers">0</strong>
    </span>
    <span class="status-item status-version">
      Assay Workflow Engine
    </span>
  </footer>

  <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">&#9776;</button>

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="/workflow/components/workflows.js"></script>
  <script src="/workflow/components/detail.js"></script>
  <script src="/workflow/components/schedules.js"></script>
  <script src="/workflow/components/workers.js"></script>
  <script src="/workflow/components/queues.js"></script>
  <script src="/workflow/components/settings.js"></script>
  <script src="/workflow/app.js"></script>
</body>
</html>

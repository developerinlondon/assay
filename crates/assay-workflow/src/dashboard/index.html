<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>assay workflow</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <link rel="stylesheet" href="/workflow/style.css">
</head>
<body>
    <header>
        <h1><a href="/workflow/">assay <span class="accent">workflow</span></a></h1>
        <nav>
            <a href="/workflow/" class="nav-link active" data-tab="workflows">Workflows</a>
            <a href="/workflow/schedules" class="nav-link" data-tab="schedules">Schedules</a>
            <a href="/workflow/workers" class="nav-link" data-tab="workers">Workers</a>
        </nav>
    </header>

    <main id="content">
        <section id="workflows-view">
            <div class="toolbar">
                <h2>Workflows</h2>
                <div class="filters">
                    <select id="status-filter" onchange="loadWorkflows()">
                        <option value="">All statuses</option>
                        <option value="PENDING">Pending</option>
                        <option value="RUNNING">Running</option>
                        <option value="WAITING">Waiting</option>
                        <option value="COMPLETED">Completed</option>
                        <option value="FAILED">Failed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                    <button onclick="loadWorkflows()" class="btn btn-sm">Refresh</button>
                </div>
            </div>

            <table class="data-table" id="workflows-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Queue</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="workflows-body">
                    <tr><td colspan="6" class="empty">Loading...</td></tr>
                </tbody>
            </table>
        </section>

        <div id="detail-panel" class="detail-panel hidden">
            <div class="detail-header">
                <h2 id="detail-title">Workflow Detail</h2>
                <button onclick="closeDetail()" class="btn btn-sm">Close</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </main>

    <script src="/workflow/app.js"></script>
</body>
</html>

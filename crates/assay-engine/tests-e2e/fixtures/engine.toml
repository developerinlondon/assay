# E2E fixture config for the engine + auth consoles. Used by
# tests-e2e/run.sh to boot the engine; never read in production. Keep
# bind_addr / public_url in lock-step with playwright.config.ts'
# baseURL.

auto_enable_modules = ["auth"]

[server]
bind_addr = "127.0.0.1:8420"
public_url = "http://localhost:8420"

[backend]
type = "sqlite"
data_dir = "/tmp/assay-engine-e2e-data"

[auth]
audience = ["http://localhost:8420"]
admin_api_keys = ["dev-admin-key-change-me"]

[auth.passkey]
rp_id = "localhost"
rp_name = "Assay E2E"

[auth.oidc_provider]
enabled = true

# Vault module is default-enabled when compiled in. This is a throwaway
# E2E fixture (never production) so it uses an inline base64 32-byte
# unseal key to exercise the real sealed-at-rest boot path (#113). The
# value below decodes to 32 zero bytes — fine for an ephemeral fixture.
[vault]
unseal_key_source = "base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

[logging]
level = "info"
format = "pretty"

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: assay-linux-x86_64
            deps: sudo apt-get update && sudo apt-get install -y musl-tools
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: assay-darwin-aarch64
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/assay ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: assay-*
          path: artifacts

      - name: Prepare release assets
        run: |
          chmod +x artifacts/assay-linux-x86_64/assay-linux-x86_64
          chmod +x artifacts/assay-darwin-aarch64/assay-darwin-aarch64
          sha256sum artifacts/*/assay-* > checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            artifacts/assay-linux-x86_64/assay-linux-x86_64 \
            artifacts/assay-darwin-aarch64/assay-darwin-aarch64 \
            checksums-sha256.txt \
            --generate-notes

  crates-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish assay-workflow to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # The root assay-lua crate has an optional dep on assay-workflow,
        # so the engine crate must be published first. --allow-dirty
        # because release.yml runs against a tagged commit (clean working
        # tree, but some CI dirs may exist from prior steps).
        run: cargo publish --allow-dirty -p assay-workflow

      - name: Wait for crates.io indexing
        # Newly-published versions take a few seconds to be discoverable
        # by `cargo publish`. Without this, the assay-lua publish below
        # may fail to resolve assay-workflow = "0.1".
        run: sleep 30

      - name: Publish assay-lua to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty -p assay-lua

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/developerinlondon/assay:${{ github.ref_name }}
            ghcr.io/developerinlondon/assay:latest

  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Sync version from git tag
        working-directory: openclaw-extension
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish to GitHub Packages
        working-directory: openclaw-extension
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

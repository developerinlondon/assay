# Cloudflare Pages Deploy Workflow
#
# Build pipeline: cargo build → assay site/build.lua → wrangler deploys build/site/
#
# PREREQUISITES:
# 1. Cloudflare Pages project 'assay-rs' with custom domain assay.rs
# 2. GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "docs/modules/**"
      - "src/lua/builtins/mod.rs"
      - "stdlib/**"
      - "CHANGELOG.md"
      - "wrangler.toml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: false

env:
  # cloudflare/wrangler-action@v3 still declares node20 upstream. Opt in now
  # so deploy breaks during our control window rather than at GitHub's cutoff.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy site to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Pin rust to whatever .mise.toml says (single source of truth
      # for the workspace toolchain) so the site build uses the same
      # compiler the rest of CI does.
      - id: rust
        name: Read rust version from .mise.toml
        run: |
          set -euo pipefail
          v=$(grep -oP '^rust\s*=\s*"\K[0-9]+\.[0-9]+(\.[0-9]+)?' .mise.toml)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.version }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-deploy-

      - name: Build assay
        run: cargo build --release

      - name: Build site (assay builds its own docs)
        run: ./target/release/assay site/build.lua

      - name: Index site for search
        run: npx --yes pagefind --site build/site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/site/ --project-name=assay-rs

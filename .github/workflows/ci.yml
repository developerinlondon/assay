name: CI

# pull_request validates the merge commit; branch protection blocks
# direct pushes to main, so a push trigger would re-run on identical
# code. Tag pushes (`v*`) are handled by release.yml.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect what changed so independent surfaces only pay for their own gates.
  # CI config changes are validated by workflow-lint; they do not force
  # unrelated Rust, browser, extension, or sysops jobs.
  changes:
    runs-on: ubuntu-latest
    outputs:
      assay_rust: ${{ steps.filter.outputs.assay_rust }}
      assay_lua_tests: ${{ steps.filter.outputs.assay_lua_tests }}
      engine_lua: ${{ steps.filter.outputs.engine_lua }}
      dashboard_e2e: ${{ steps.filter.outputs.dashboard_e2e }}
      engine_e2e: ${{ steps.filter.outputs.engine_e2e }}
      extension: ${{ steps.filter.outputs.extension }}
      sysops: ${{ steps.filter.outputs.sysops }}
      site: ${{ steps.filter.outputs.site }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            assay_rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/*/Cargo.toml'
              - 'crates/*/build.rs'
              - 'crates/*/src/**'
              - 'crates/*/examples/**'
              - 'crates/*/benches/**'
              - 'crates/*/tests/**/*.rs'
            assay_lua_tests:
              - 'crates/assay/moon.yml'
              - 'crates/assay/stdlib/**/*.lua'
              - 'crates/assay/tests/**/*.lua'
              - 'crates/assay/tests/stdlib_pkg.rs'
              - 'crates/assay/tests/stdlib_nspawn.rs'
              - 'crates/assay/tests/stdlib_rustic.rs'
              - 'crates/assay/tests/stdlib_fs_snapshot.rs'
            engine_lua:
              - 'crates/assay-engine/tests-lua/**'
              - 'crates/assay-engine/examples/init/**'
              - 'crates/assay-engine/src/**'
              - 'crates/assay-auth/src/**'
              - 'crates/assay-workflow/src/**'
              - 'crates/assay/stdlib/engine.lua'
              - 'crates/assay/stdlib/engine/**'
            dashboard_e2e:
              - 'crates/assay-workflow/tests-e2e/**'
              - 'crates/assay-dashboard/src/**'
              - 'crates/assay-workflow/src/api/**'
              - 'crates/assay-engine/src/**'
            engine_e2e:
              - 'crates/assay-engine/tests-e2e/**'
              - 'crates/assay-dashboard/src/**'
              - 'crates/assay-engine/src/**'
              - 'crates/assay-auth/src/**'
            extension:
              - 'openclaw-extension/**'
            sysops:
              - 'libs/sysops/**'
            site:
              - 'site/**'
              - 'docs/**'
              - 'CHANGELOG.md'
              - 'llms.txt'
              - 'crates/assay/src/lua/builtins/mod.rs'
              - 'crates/assay/stdlib/**'
            ci:
              - 'renovate.json'
              - '.github/workflows/**'
              - '.github/release/**'
              - '.mise.toml'
              - '.moon/**'
              - 'moon.yml'
              - 'rust-toolchain.toml'
              - 'scripts/**'

  check:
    needs: changes
    # Required branch-protection check. It always materializes on both
    # Linux and macOS, but the heavy steps are selected from path filters
    # so sysops/extension/docs/CI-only diffs do not run the full workspace.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    # Self-hosted runner routing.
    #
    # Linux row: routes to the maintainer's self-hosted runner whenever
    # the actor is the maintainer; any other actor (Dependabot, outside
    # contributors) falls back to `ubuntu-latest`.
    #
    # macOS row: always uses GitHub-hosted `macos-14`. GitHub Actions
    # cannot fall back from an offline self-hosted runner once a job has
    # been routed there, so required PR checks must not depend on a local
    # Mac runner being online.
    runs-on: >-
      ${{
        (matrix.os == 'ubuntu-latest' && github.actor == 'developerinlondon' && fromJSON('["self-hosted","linux","assay"]'))
        || matrix.os
      }}
    timeout-minutes: 25

    steps:
      - name: Select check targets
        id: targets
        shell: bash
        env:
          ASSAY_RUST: ${{ needs.changes.outputs.assay_rust }}
          ASSAY_LUA_TESTS: ${{ needs.changes.outputs.assay_lua_tests }}
          ENGINE_LUA: ${{ needs.changes.outputs.engine_lua }}
          SITE: ${{ needs.changes.outputs.site }}
        run: |
          set -euo pipefail
          targets=()

          if [[ "$ASSAY_RUST" == "true" ]]; then
            targets+=(assay-lua:lint assay-lua:build assay-lua:test)
          elif [[ "$ASSAY_LUA_TESTS" == "true" ]]; then
            targets+=(assay-lua:test-lua-stdlib)
          fi

          if [[ "$ENGINE_LUA" == "true" ]]; then
            targets+=(engine-lua:test)
          fi

          if [[ "$SITE" == "true" ]]; then
            targets+=(site:build)
          fi

          if ((${#targets[@]} == 0)); then
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
            echo "No Assay/runtime targets selected for this diff."
          else
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
            echo "targets=${targets[*]}" >> "$GITHUB_OUTPUT"
            printf 'Selected check targets: %s\n' "${targets[*]}"
          fi

      - uses: actions/checkout@v6
        if: steps.targets.outputs.run_checks == 'true'
        with:
          # Full history keeps moon's project graph and VCS metadata
          # available for any selected target.
          fetch-depth: 0

      # .mise.toml is the single source of truth for tool versions.
      # Pinning mise itself avoids a flaky `latest` CDN failure
      # ("zstd: unexpected end of file" / "tar: child returned status 1").
      - uses: jdx/mise-action@v4.0.1
        if: steps.targets.outputs.run_checks == 'true'
        with:
          version: 2026.4.17
          install: true
          cache: true

      # On self-hosted, ~/.cargo/bin contains rustup but isn't on the
      # default GH Actions step PATH. The hosted runners have it because
      # Swatinem/rust-cache@v2 implicitly installs rustup and prepends
      # ~/.cargo/bin; we skip that action on self-hosted, so we have to
      # add it ourselves.
      - name: Add ~/.cargo/bin to PATH (self-hosted)
        if: steps.targets.outputs.run_checks == 'true' && runner.environment == 'self-hosted'
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # Keep self-hosted Cargo output off the runner checkout volume. On
      # assay-runner-eda, /var/cache/runner-work is mounted from the
      # dedicated cargo-targets LV and is owned by the runner user.
      - name: Use dedicated Cargo target dir (self-hosted)
        if: steps.targets.outputs.run_checks == 'true' && runner.environment == 'self-hosted'
        run: |
          mkdir -p /var/cache/runner-work/assay-target
          echo "CARGO_TARGET_DIR=/var/cache/runner-work/assay-target" >> "$GITHUB_ENV"

      # mise's rust plugin defaults to the `minimal` profile (no clippy).
      - name: Install clippy component
        if: steps.targets.outputs.run_checks == 'true' && needs.changes.outputs.assay_rust == 'true'
        run: rustup component add clippy

      # Swatinem/rust-cache@v2 with a Cargo.lock-keyed cache. The
      # `key` input ties saves to the locked dep graph, so unchanged
      # PR pushes hit the exact key (no rebuild) instead of falling
      # back to a restore-key partial match (rebuild affected crates).
      # `save-if: contains` skips the ~250MB upload on cache-hit-no-
      # changes runs.
      #
      # `cache-targets: true` keeps target/ in the cache too — main
      # win is that aws-lc-sys + ring + sqlx-macros + webauthn-rs's
      # build-script outputs round-trip rather than rebuild. Heavy
      # build crates dominate cold-restore time on this workspace.
      #
      # Skipped on self-hosted: the assay-runner container writes
      # CARGO_TARGET_DIR to a locally-persistent dedicated LV, and the
      # post-step's ~250MB upload over the home internet wipes out half
      # the speedup. Github-hosted (macOS, Dependabot) still needs the
      # cache.
      - uses: Swatinem/rust-cache@v2
        if: steps.targets.outputs.run_checks == 'true' && runner.environment == 'github-hosted'
        with:
          shared-key: "ci-${{ matrix.target }}-v4"
          key: ${{ hashFiles('**/Cargo.lock') }}
          cache-all-crates: "true"
          cache-targets: "true"
          # Save the cache only on PR runs (Swatinem/rust-cache already
          # gates internally on job success). Avoids re-uploading ~250MB
          # for non-PR contexts. `success()` cannot appear in `with:`
          # inputs — it's restricted to `if:` of jobs/steps.
          save-if: ${{ github.event_name == 'pull_request' }}

      # Shared Postgres for Ubuntu only. `services:` can't be conditional
      # in a matrix and macOS GH runners have no Docker. Starting PG once
      # per job + creating a database per test (via TEST_DATABASE_URL)
      # eliminates the per-test testcontainer churn that intermittently
      # hung the docker daemon. macOS is SQLite-only (PG cases cfg-gated
      # `target_os = "linux"`).
      #
      # Skipped on self-hosted: the assay-runner nspawn container has
      # postgres-18 installed as a systemd service, listening on
      # localhost:5432 with the same trust-auth credentials.
      - name: Start Postgres 18 (Linux)
        if: steps.targets.outputs.run_checks == 'true' && needs.changes.outputs.assay_rust == 'true' && runner.os == 'Linux' && runner.environment == 'github-hosted'
        run: |
          docker run -d --name assay-pg-test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:18-alpine
          for i in {1..30}; do
            if docker exec assay-pg-test pg_isready -U postgres -q; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Postgres failed to become ready within 30s" >&2
          docker logs assay-pg-test >&2
          exit 1

      - name: Set TEST_DATABASE_URL (Linux)
        if: steps.targets.outputs.run_checks == 'true' && needs.changes.outputs.assay_rust == 'true' && runner.os == 'Linux'
        run: echo "TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres" >> "$GITHUB_ENV"

      - name: moon run selected checks
        if: steps.targets.outputs.run_checks == 'true'
        run: moon run ${{ steps.targets.outputs.targets }} --color
        env:
          MOON_LOG: "info"

      - name: Cleanup self-hosted Postgres test databases
        if: always() && steps.targets.outputs.run_checks == 'true' && needs.changes.outputs.assay_rust == 'true' && runner.os == 'Linux' && runner.environment == 'self-hosted'
        run: |
          psql "$TEST_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname LIKE 'assay_test_%';

          SELECT format('DROP DATABASE IF EXISTS %I WITH (FORCE);', datname)
          FROM pg_database
          WHERE datname LIKE 'assay_test_%'
          \gexec
          SQL

      # `assay site/build.lua` (the moon `site:build` task above)
      # rewrites the stdlib table in README.md in place from
      # docs/modules/*.md frontmatter. If that rewrite produced a diff,
      # the committed README was out of sync — fail with a clear hint
      # rather than letting drift slip through. Linux only: macOS would
      # produce the same result, asserting twice is noise.
      - name: Docs are in sync (README stdlib table)
        if: steps.targets.outputs.run_checks == 'true' && needs.changes.outputs.site == 'true' && runner.os == 'Linux'
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error title=README.md out of sync::Run 'assay site/build.lua' locally and commit the result. The stdlib table is generated from docs/modules/*.md frontmatter; edit those (or build.lua's category_order) — not README directly."
            exit 1
          fi

  workflow-lint:
    name: workflow-lint
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/ci.yml .github/workflows/deploy.yml

  dashboard-e2e:
    name: dashboard-e2e
    needs: changes
    if: needs.changes.outputs.dashboard_e2e == 'true'
    runs-on: ${{ github.actor == 'developerinlondon' && fromJSON('["self-hosted","linux","assay"]') || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: 2026.4.17
          install: true
          cache: true

      - name: Cache Playwright browsers
        if: runner.environment == 'github-hosted'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-dashboard-${{ hashFiles('crates/assay-workflow/tests-e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-dashboard-
            playwright-${{ runner.os }}-

      - name: Wipe stale dashboard e2e state (self-hosted)
        if: runner.environment == 'self-hosted'
        run: |
          rm -rf /tmp/assay-e2e.* /tmp/assay-e2e-*.toml /tmp/assay-e2e-*.log
          rm -f  /tmp/engine.db /tmp/engine.db-* \
                 /tmp/auth.db   /tmp/auth.db-* \
                 /tmp/vault.db  /tmp/vault.db-* \
                 /tmp/workflow.db /tmp/workflow.db-*

      - name: moon run dashboard-e2e:test
        run: moon run dashboard-e2e:test --color
        env:
          MOON_LOG: "info"

      - name: Upload dashboard Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-e2e-report
          path: |
            crates/assay-workflow/tests-e2e/playwright-report
            crates/assay-workflow/tests-e2e/test-results
            /tmp/assay-e2e-engine.log
            /tmp/assay-e2e-worker.log
          if-no-files-found: ignore
          retention-days: 7

  engine-e2e:
    name: engine-e2e
    needs: changes
    if: needs.changes.outputs.engine_e2e == 'true'
    runs-on: ${{ github.actor == 'developerinlondon' && fromJSON('["self-hosted","linux","assay"]') || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: 2026.4.17
          install: true
          cache: true

      - name: Cache Playwright browsers
        if: runner.environment == 'github-hosted'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-engine-${{ hashFiles('crates/assay-engine/tests-e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-engine-
            playwright-${{ runner.os }}-

      - name: Wipe stale engine e2e state (self-hosted)
        if: runner.environment == 'self-hosted'
        run: rm -rf /tmp/assay-engine-e2e-* /tmp/assay-engine-e2e.log

      - name: moon run engine-e2e:test
        run: moon run engine-e2e:test --color
        env:
          MOON_LOG: "info"

      - name: Upload engine Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: engine-e2e-report
          path: |
            crates/assay-engine/tests-e2e/playwright-report
            crates/assay-engine/tests-e2e/test-results
            /tmp/assay-engine-e2e.log
          if-no-files-found: ignore
          retention-days: 7

  # Dedicated extension gate so an extension-only break fails this job
  # specifically rather than hiding behind a generic "moon ci failed".
  extension-tests:
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    runs-on: ${{ github.actor == 'developerinlondon' && fromJSON('["self-hosted","linux","assay"]') || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: 2026.4.17
          install: true
          cache: true

      - name: moon run openclaw-extension:test
        run: moon run openclaw-extension:test --color
        env:
          MOON_LOG: "info"

  # Browser-side UI tests for libs/sysops/ — orchestrated by moon
  # (project: sysops-e2e, task: test). The task definition handles
  # the assay-lua build + npm install + playwright install + run.sh
  # boot/teardown.
  sysops-e2e:
    name: sysops-e2e
    needs: changes
    # Heavy browser-test job. Triggered only when libs/sysops/ changes;
    # Assay/runtime, extension, docs, and CI-only PRs do not pay this cycle.
    if: needs.changes.outputs.sysops == 'true'
    runs-on: ${{ github.actor == 'developerinlondon' && fromJSON('["self-hosted","linux","assay"]') || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # Moon needs main to compute affected projects.
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: 2026.4.17
          install: true
          cache: true

      - name: Cache Playwright browsers
        if: runner.environment == 'github-hosted'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-sysops-${{ hashFiles('libs/sysops/tests-e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-sysops-
            playwright-${{ runner.os }}-

      - name: moon run sysops-e2e:test
        run: moon run sysops-e2e:test --color
        env:
          MOON_LOG: "info"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sysops-e2e-report
          path: |
            libs/sysops/tests-e2e/playwright-report
            libs/sysops/tests-e2e/test-results
            /tmp/sysops-e2e.log
          if-no-files-found: ignore
          retention-days: 7

  # Route-level smoke against libs/sysops/ — moon project `sysops`,
  # task `smoke`. Boots the lib in-process with stub services and
  # asserts representative routes return 2xx with the expected content.
  sysops-smoke:
    name: sysops-smoke
    needs: changes
    # Same trigger narrowing as sysops-e2e.
    if: needs.changes.outputs.sysops == 'true'
    runs-on: ${{ github.actor == 'developerinlondon' && fromJSON('["self-hosted","linux","assay"]') || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          # Moon needs main to compute affected projects.
          fetch-depth: 0

      - uses: jdx/mise-action@v4.0.1
        with:
          version: 2026.4.17
          install: true
          cache: true

      - name: moon run sysops:smoke
        run: moon run sysops:smoke --color
        env:
          MOON_LOG: "info"

  # Catches public-API drift in workspace crates so the release-time
  # `cargo publish --verify` step doesn't fail on a method that was
  # added to a workspace dep without bumping that dep's Cargo.toml.
  semver-checks:
    name: cargo-semver-checks
    needs: changes
    if: needs.changes.outputs.assay_rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: obi1kenobi/cargo-semver-checks-action@v2

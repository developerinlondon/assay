# assay.rs static site — built by `assay site/build.lua` from
# markdown docs + stdlib reference data + CHANGELOG.md.
# Deploy is handled by .github/workflows/deploy.yml on pushes to
# main; this `build` task gives `moon ci` a way to validate the site
# builds clean on every PR that touches its inputs.

language: "lua"
layer: "application"
stack: "frontend"

tasks:
  build:
    # build.lua reads other paths (crates/assay/src/lua/builtins/mod.rs,
    # crates/assay/stdlib/**, docs/**, CHANGELOG.md) relative to cwd, so
    # it needs to run from the repo root — not from site/. Wrap in a shell.
    command: 'bash -c "cd .. && ./target/release/assay site/build.lua"'
    deps:
      - "assay-lua:build-runtime"
    inputs:
      - "**/*"
      - "/docs/**/*"
      - "/crates/assay/stdlib/**/*"
      - "/CHANGELOG.md"
      - "/llms.txt"
      - "/crates/assay/src/lua/builtins/mod.rs"
    outputs:
      - "/build/site/**/*"
    options:
      cache: true
      runInCI: true

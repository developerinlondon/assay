<header class="page-header">
  <div>
    <div class="page-eyebrow"><a href="/">Host</a> · <a href="/backups">backups</a> · schedule</div>
    <h1 class="page-title">Edit schedule</h1>
  </div>
</header>

<div class="card">
  <div class="card-body">
    <form method="POST" action="/api/backups/schedule">
      <fieldset style="border:1px solid var(--border-1); padding:12px; margin-bottom:12px">
        <legend>Schedule</legend>
        <div class="kvgrid">
          <span class="k">enabled</span>
          <span class="v">
            <input type="checkbox" name="enabled" value="on"
                   {% if schedule_status.enabled %}checked{% endif %}>
            daily backup enabled
          </span>
          <label class="k" for="hour">run at</label>
          <span class="v">
            <input type="number" name="hour" id="hour" min="0" max="23"
                   value="{{ schedule_hour | default(2) }}" style="width:4em">:00 host local time
          </span>
          <label class="k" for="jitter_s">jitter</label>
          <span class="v">
            <input type="number" name="jitter_s" id="jitter_s" min="0" max="86400"
                   value="1800" style="width:6em"> seconds (±)
          </span>
        </div>
      </fieldset>

      <p class="muted" style="font-size:0.85em">
        Resulting unit: <code>OnCalendar=*-*-* HH:00:00</code> +
        <code>RandomizedDelaySec={{ "{{jitter_s}}" }}</code> + <code>Persistent=true</code>.
        Missed runs (host off at scheduled time) catch up on next boot.
      </p>

      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px">
        <a href="/backups" class="btn">Cancel</a>
        <button type="submit" class="btn btn-primary">Save schedule</button>
      </div>
    </form>
  </div>
</div>

# Playwright UI tests for libs/sysops.
#
# Boots the lib via tests-e2e/run.sh (mounts sysops with stub
# services, binds http.serve on $E2E_PORT, runs Playwright against it),
# then tears down. CI runs this as its own path-gated job so sysops
# browser coverage does not pull in unrelated engine/dashboard e2e setup.

language: "typescript"
layer: "automation"
stack: "frontend"

tasks:
  install:
    command: "npm install --no-audit --no-fund"
    inputs:
      - "package.json"
      - "package-lock.json"
    outputs:
      - "node_modules"
    options:
      cache: true
      runInCI: true

  install-browsers:
    command: "bash $workspaceRoot/scripts/playwright-install-with-retry.sh chromium"
    deps:
      - "install"
    options:
      cache: false
      runInCI: true

  test:
    command: "bash run.sh"
    deps:
      - "assay-lua:build-runtime"
      - "install-browsers"
    inputs:
      - "**/*.{ts,sh,json}"
      - "/libs/sysops/**/*.{lua,html,css,js}"
      - "/libs/sysops/VERSION"
    options:
      cache: true
      runInCI: true
      retryCount: 1
